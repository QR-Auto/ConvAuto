<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Convoyage Bonnefis Automobile — État Véhicule</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --accent: #e11d48; /* ROUGE */
    --accent2: #9f1239;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #f0f2f8;
    --muted: #8b90a8;
    --border: #2e3249;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; padding-bottom: 120px; }

  /* HEADER */
  .header { background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%); border-bottom: 2px solid var(--accent); padding: 18px 20px 14px; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 22px; color: var(--accent); text-transform: uppercase; }
  .logo span { color: var(--text); }
  
  .mission-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
  .mission-field { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; }
  .mission-field label { display: block; font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 3px; }
  .mission-field input { background: none; border: none; outline: none; color: var(--text); font-size: 15px; font-weight: 600; width: 100%; }

  /* TYPE SELECTOR */
  .type-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 0; margin: 16px 20px 0; background: var(--surface2); border-radius: 12px; padding: 4px; border: 1px solid var(--border); }
  .type-btn { padding: 10px; border: none; border-radius: 9px; background: none; color: var(--muted); font-family: 'Barlow Condensed', sans-serif; font-weight: 700; text-transform: uppercase; cursor: pointer; }
  .type-btn.active { background: var(--accent); color: white; }
  .type-btn.active.restitution { background: var(--green); }

  /* PROGRESS */
  .progress-wrap { padding: 14px 20px 0; }
  .progress-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .progress-count { font-weight: 800; color: var(--accent); }
  .progress-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }

  /* CHECKLIST */
  .section { margin: 25px 20px 0; }
  .section-title { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .items-grid { display: flex; flex-direction: column; gap: 10px; }
  .check-item { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 14px; display: flex; align-items: center; gap: 12px; }
  .check-item.ok { border-color: var(--green); }
  .check-item.ko { border-color: var(--red); }
  .check-item.rq { border-color: var(--yellow); }
  
  .check-info { flex: 1; }
  .check-name { font-weight: 600; font-size: 15px; }
  .check-sub { font-size: 12px; color: var(--muted); }

  .state-btns { display: flex; gap: 6px; }
  .state-btn { width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); cursor: pointer; }
  .state-btn.active.ok-btn { background: var(--green); color: white; border-color: var(--green); }
  .state-btn.active.ko-btn { background: var(--red); color: white; border-color: var(--red); }
  .state-btn.active.rq-btn { background: var(--yellow); color: white; border-color: var(--yellow); }

  .remarque-wrap { margin-top: 8px; display: none; padding: 0 10px; }
  .remarque-wrap.visible { display: block; }
  .remarque-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px; color: white; }

  /* PHOTOS */
  .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 20px; }
  .photo-slot { aspect-ratio: 1; background: var(--surface); border: 2px dashed var(--border); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .photo-slot img { position: absolute; width: 100%; height: 100%; object-fit: cover; }
  .photo-slot span { font-size: 10px; color: var(--muted); text-align: center; }

  /* SIGNATURE */
  .sig-wrap { margin: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }
  canvas { width: 100%; height: 150px; touch-action: none; }

  /* FOOTER */
  .footer-cta { position: fixed; bottom: 0; width: 100%; padding: 20px; background: linear-gradient(to top, var(--bg), transparent); }
  .btn-main { width: 100%; padding: 16px; background: var(--accent); border: none; border-radius: var(--radius); color: white; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

  /* MODAL */
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; padding: 40px 20px; }
  .modal.show { display: block; }
  .modal-content { background: var(--surface); padding: 20px; border-radius: 20px; text-align: center; }
  .btn-pdf { width: 100%; padding: 15px; margin-top: 15px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: 700; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🏎️ Bonnefis<span>Convoyage</span></div>
  <div class="mission-bar">
    <div class="mission-field"><label>Immat</label><input type="text" id="immat" placeholder="AA-123-BB"></div>
    <div class="mission-field"><label>Modèle</label><input type="text" id="modele" placeholder="Ex: Clio 5"></div>
    <div class="mission-field"><label>Date</label><input type="date" id="date"></div>
    <div class="mission-field"><label>KM</label><input type="number" id="km" placeholder="0"></div>
  </div>
</div>

<div class="type-selector">
  <button class="type-btn active" id="btn-remise" onclick="setType('remise')">📤 Remise</button>
  <button class="type-btn" id="btn-restitution" onclick="setType('restitution')">📥 Restitution</button>
</div>

<div class="progress-wrap">
  <div class="progress-header"><span>Progression</span><span id="prog-count">0 / 21</span></div>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
</div>

<div id="checklist-container"></div>

<div class="section"><div class="section-title">📷 Photos obligatoires</div></div>
<div class="photo-grid" id="photo-grid"></div>

<div class="section"><div class="section-title">✍️ Signature Client</div></div>
<div class="sig-wrap">
  <div style="padding:10px; display:flex; justify-content:space-between">
    <span style="font-size:12px; color:var(--muted)">Signez ci-dessous</span>
    <button onclick="clearSig()" style="background:none; border:none; color:var(--accent); font-size:12px">Effacer</button>
  </div>
  <canvas id="sig-canvas"></canvas>
</div>

<div class="footer-cta">
  <button class="btn-main" onclick="showModal()">📋 Terminer l'inspection</button>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Rapport Prêt</h3>
    <p style="color:var(--muted); margin: 10px 0;">Voulez-vous générer le PDF ?</p>
    <button class="btn-pdf" onclick="exportPDF()">📄 Télécharger le PDF ROUGE</button>
    <button onclick="closeModal()" style="margin-top:15px; background:none; border:none; color:var(--muted)">Annuler</button>
  </div>
</div>

<script>
const SECTIONS = [
  { title: "🔍 Extérieur", items: [
    { id: "ext-av", name: "Face Avant", sub: "Pare-choc, optiques" },
    { id: "ext-ar", name: "Face Arrière", sub: "Pare-choc, feux" },
    { id: "ext-g", name: "Côté Gauche", sub: "Portes, ailes" },
    { id: "ext-d", name: "Côté Droit", sub: "Portes, ailes" },
    { id: "ext-p", name: "Pavillon", sub: "Toit" },
    { id: "ext-v", name: "Vitrages", sub: "Pare-brise, vitres" },
    { id: "p-avg", name: "Pneu AV Gauche", sub: "Jante/Pneu" },
    { id: "p-avd", name: "Pneu AV Droit", sub: "Jante/Pneu" },
    { id: "p-arg", name: "Pneu AR Gauche", sub: "Jante/Pneu" },
    { id: "p-ard", name: "Pneu AR Droit", sub: "Jante/Pneu" }
  ]},
  { title: "🚗 Intérieur", items: [
    { id: "int-p", name: "Tableau de bord", sub: "Écrans, GPS" },
    { id: "int-s-av", name: "Sièges AV", sub: "Propreté" },
    { id: "int-s-ar", name: "Sièges AR", sub: "Propreté" },
    { id: "int-c", name: "Ciel de toit", sub: "État" },
    { id: "int-t", name: "Tapis / Moquette", sub: "Usure" },
    { id: "int-e", name: "Éclairage intérieur", sub: "Fonctionnement" },
    { id: "int-o", name: "Odeur", sub: "Tabac/Animaux" }
  ]},
  { title: "⚙️ Administratif", items: [
    { id: "doc-cg", name: "Carte Grise", sub: "Présence" },
    { id: "doc-as", name: "Assurance", sub: "Vignette" },
    { id: "doc-cl", name: "Double de Clés", sub: "Nombre" },
    { id: "kit-s", name: "Kit Sécurité", sub: "Gilet/Triangle" }
  ]}
];

const PHOTO_LABELS = [
  {id:'av', n:'Avant'}, {id:'ar', n:'Arrière'}, {id:'g', n:'Gauche'},
  {id:'d', n:'Droite'}, {id:'int', n:'Intérieur'}, {id:'km', n:'Compteur'}
];

let states = {};
let photoData = {};
let currentType = 'remise';
let sigCanvas, sigCtx, sigDrawing = false, sigHasMark = false;

function init() {
  document.getElementById('date').value = new Date().toISOString().split('T')[0];
  const container = document.getElementById('checklist-container');
  
  SECTIONS.forEach(sec => {
    let html = `<div class="section"><div class="section-title">${sec.title}</div><div class="items-grid">`;
    sec.items.forEach(item => {
      states[item.id] = null;
      html += `
        <div class="check-item" id="row-${item.id}">
          <div class="check-info"><div class="check-name">${item.name}</div><div class="check-sub">${item.sub}</div></div>
          <div class="state-btns">
            <button class="state-btn ok-btn" onclick="setState('${item.id}','ok')">✓</button>
            <button class="state-btn rq-btn" onclick="setState('${item.id}','rq')">!</button>
            <button class="state-btn ko-btn" onclick="setState('${item.id}','ko')">✗</button>
          </div>
        </div>
        <div class="remarque-wrap" id="rq-${item.id}"><textarea class="remarque-input" id="txt-${item.id}" placeholder="Précisez le défaut..."></textarea></div>
      `;
    });
    html += `</div></div>`;
    container.innerHTML += html;
  });

  const pGrid = document.getElementById('photo-grid');
  PHOTO_LABELS.forEach(p => {
    const div = document.createElement('div');
    div.className = 'photo-slot';
    div.id = `slot-${p.id}`;
    div.innerHTML = `<span>📷</span><span>${p.n}</span><input type="file" accept="image/*" capture="environment" style="display:none" id="img-${p.id}">`;
    div.onclick = () => document.getElementById(`img-${p.id}`).click();
    pGrid.appendChild(div);
    
    document.getElementById(`img-${p.id}`).onchange = (e) => {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = (f) => {
        photoData[p.id] = f.target.result;
        div.innerHTML = `<img src="${f.target.result}">`;
      };
      reader.readAsDataURL(file);
    };
  });

  initSig();
}

function setState(id, val) {
  states[id] = (states[id] === val) ? null : val;
  const row = document.getElementById(`row-${id}`);
  row.classList.remove('ok','ko','rq');
  row.querySelectorAll('.state-btn').forEach(b => b.classList.remove('active'));
  if(states[id]) {
    row.classList.add(states[id]);
    row.querySelector(`.${states[id]}-btn`).classList.add('active');
  }
  document.getElementById(`rq-${id}`).classList.toggle('visible', states[id] === 'ko' || states[id] === 'rq');
  updateProgress();
}

function updateProgress() {
  const total = 21;
  const done = Object.values(states).filter(v => v !== null).length;
  document.getElementById('prog-count').textContent = `${done} / ${total}`;
  document.getElementById('prog-fill').style.width = `${(done/total)*100}%`;
}

function setType(t) {
  currentType = t;
  document.getElementById('btn-remise').classList.toggle('active', t === 'remise');
  document.getElementById('btn-restitution').classList.toggle('active', t === 'restitution');
}

function initSig() {
  sigCanvas = document.getElementById('sig-canvas');
  sigCtx = sigCanvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  sigCanvas.width = sigCanvas.offsetWidth * dpr;
  sigCanvas.height = sigCanvas.offsetHeight * dpr;
  sigCtx.scale(dpr, dpr);
  sigCtx.strokeStyle = '#e11d48';
  sigCtx.lineWidth = 2;

  const start = (e) => { sigDrawing = true; sigCtx.beginPath(); const p = getPos(e); sigCtx.moveTo(p.x, p.y); };
  const move = (e) => { if(!sigDrawing) return; const p = getPos(e); sigCtx.lineTo(p.x, p.y); sigCtx.stroke(); sigHasMark = true; };
  const getPos = (e) => {
    const r = sigCanvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - r.left, y: t.clientY - r.top };
  };
  sigCanvas.addEventListener('mousedown', start);
  sigCanvas.addEventListener('mousemove', move);
  window.addEventListener('mouseup', () => sigDrawing = false);
  sigCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); });
  sigCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); move(e); });
}

function clearSig() { sigCtx.clearRect(0,0,sigCanvas.width, sigCanvas.height); sigHasMark = false; }
function showModal() { document.getElementById('modal').classList.add('show'); }
function closeModal() { document.getElementById('modal').classList.remove('show'); }

function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const W = 210; const margin = 15;
  let y = 20;

  const immat = document.getElementById('immat').value || '—';
  const date = document.getElementById('date').value || '—';

  // Header ROUGE
  doc.setFillColor(15, 17, 23); doc.rect(0, 0, W, 28, 'F');
  doc.setFillColor(225, 29, 72); doc.rect(0, 26, W, 2, 'F');
  doc.setTextColor(225, 29, 72); doc.setFontSize(20); doc.setFont('helvetica', 'bold');
  doc.text('Bonnefis Convoyage', margin, 17);
  doc.setTextColor(255, 255, 255); doc.setFontSize(10);
  doc.text('ÉTAT DU VÉHICULE - ' + currentType.toUpperCase(), margin + 75, 17);

  y = 40;
  doc.setTextColor(0,0,0); doc.setFontSize(11);
  doc.text(`Immatriculation : ${immat}`, margin, y);
  doc.text(`Kilométrage : ${document.getElementById('km').value} km`, margin + 100, y);
  y += 15;

  // Checklist
  SECTIONS.forEach(sec => {
    doc.setFont('helvetica', 'bold'); doc.text(sec.title, margin, y); y += 7;
    doc.setFont('helvetica', 'normal'); doc.setFontSize(9);
    sec.items.forEach(item => {
      const s = states[item.id] || 'ND';
      const txt = document.getElementById(`txt-${item.id}`)?.value;
      doc.text(`- ${item.name} : ${s.toUpperCase()} ${txt ? '('+txt+')' : ''}`, margin + 5, y);
      y += 6;
      if(y > 275) { doc.addPage(); y = 20; }
    });
    y += 5;
  });

  // Photos
  const photos = Object.keys(photoData);
  if(photos.length > 0) {
    doc.addPage(); y = 20;
    doc.setTextColor(225, 29, 72); doc.setFontSize(14); doc.text("GALERIE PHOTOS", margin, y);
    y += 10;
    let currentX = margin;
    photos.forEach((id, i) => {
      if(y > 240) { doc.addPage(); y = 20; }
      try {
        doc.addImage(photoData[id], 'JPEG', currentX, y, 85, 60);
        doc.setFontSize(8); doc.text(PHOTO_LABELS.find(p=>p.id===id).n, currentX + 42, y + 65, {align:'center'});
      } catch(e){}
      if(i % 2 === 0) currentX = margin + 95;
      else { currentX = margin; y += 75; }
    });
  }

  // Signature (Bas de dernière page)
  if(sigHasMark) {
    const lastY = 250;
    doc.setPage(doc.internal.getNumberOfPages());
    doc.setDrawColor(200); doc.line(margin, lastY - 5, W - margin, lastY - 5);
    doc.setTextColor(100); doc.text("SIGNATURE CLIENT :", margin, lastY);
    const sigImg = sigCanvas.toDataURL('image/png');
    doc.addImage(sigImg, 'PNG', margin, lastY + 2, 60, 25);
  }

  doc.save(`Etat_${immat}_${date}.pdf`);
  closeModal();
}

window.onload = init;
</script>
</body>
</html>
