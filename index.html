<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Convoyage Bonnefis Automobile — État Véhicule</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --accent: #e11d48;
    --accent2: #9f1239;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #f0f2f8;
    --muted: #8b90a8;
    --border: #2e3249;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    padding-bottom: 120px;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%);
    border-bottom: 2px solid var(--accent);
    padding: 18px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 1px;
    color: var(--accent);
    text-transform: uppercase;
  }
  .logo span { color: var(--text); }
  .badge-type {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--accent2);
    color: white;
  }
  .badge-type.restitution { background: var(--green); }

  /* INFOS MISSION */
  .mission-bar {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .mission-field {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
  }
  .mission-field label {
    display: block;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 3px;
  }
  .mission-field input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    font-weight: 600;
    width: 100%;
  }
  .mission-field input::placeholder { color: var(--muted); font-weight: 400; }

  /* TYPE SELECTOR */
  .type-selector {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    margin: 16px 20px 0;
    background: var(--surface2);
    border-radius: 12px;
    padding: 4px;
    border: 1px solid var(--border);
  }
  .type-btn {
    padding: 10px;
    border: none;
    border-radius: 9px;
    background: none;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .type-btn.active {
    background: var(--accent2);
    color: white;
  }
  .type-btn.active.remise { background: var(--accent2); }
  .type-btn.active.restitution { background: var(--green); }

  /* PROGRESS */
  .progress-wrap {
    padding: 14px 20px 0;
  }
  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .progress-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .progress-count {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: var(--accent);
  }
  .progress-bar {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 3px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* SECTIONS */
  .section {
    margin: 20px 20px 0;
  }
  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ITEMS */
  .items-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .check-item {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
    position: relative;
  }
  .check-item:active { transform: scale(0.98); }
  .check-item.ok { border-color: var(--green); background: rgba(34,197,94,0.07); }
  .check-item.ko { border-color: var(--red); background: rgba(239,68,68,0.07); }
  .check-item.rq { border-color: var(--yellow); background: rgba(245,158,11,0.07); }

  .check-icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .check-item.ok .check-icon { background: rgba(34,197,94,0.2); }
  .check-item.ko .check-icon { background: rgba(239,68,68,0.2); }
  .check-item.rq .check-icon { background: rgba(245,158,11,0.2); }

  .check-info { flex: 1; min-width: 0; }
  .check-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }
  .check-sub {
    font-size: 12px;
    color: var(--muted);
  }

  /* STATE BUTTONS */
  .state-btns {
    display: flex;
    gap: 5px;
    flex-shrink: 0;
  }
  .state-btn {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .state-btn:active { transform: scale(0.9); }
  .state-btn.ok-btn.active { background: var(--green); border-color: var(--green); color: white; }
  .state-btn.ko-btn.active { background: var(--red); border-color: var(--red); color: white; }
  .state-btn.rq-btn.active { background: var(--yellow); border-color: var(--yellow); color: white; }

  /* REMARQUE */
  .remarque-wrap {
    padding: 0 20px;
    margin-top: 8px;
    display: none;
  }
  .remarque-wrap.visible { display: block; }
  .remarque-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--yellow);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    outline: none;
    resize: none;
    min-height: 60px;
  }
  .remarque-input::placeholder { color: var(--muted); }

  /* SECTION PHOTOS */
  .photos-section {
    margin: 20px;
  }
  .photo-label-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .photo-slot {
    aspect-ratio: 1;
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 24px;
    color: var(--muted);
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .photo-slot:active { transform: scale(0.95); border-color: var(--accent); }
  .photo-slot label-text {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
    display: block;
  }
  .photo-slot img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 10px;
  }
  .photo-slot input[type=file] {
    display: none;
  }
  .photo-slot span { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* KILOMETRAGE */
  .km-section {
    margin: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .km-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .km-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .km-field { }
  .km-field label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .km-field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 700;
    outline: none;
  }
  .km-field input:focus { border-color: var(--accent); }

  /* SIGNATURE */
  .sig-section {
    margin: 20px;
  }
  <div style="margin-bottom:10px; display:flex; gap:10px;">
  <input type="text" id="client-nom" placeholder="Nom du client"
    style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:white;">
  
  <input type="text" id="client-prenom" placeholder="Prénom du client"
    style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:white;">
</div>
  .sig-wrap {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .sig-label-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sig-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .sig-clear {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Barlow', sans-serif;
  }
  canvas.sig-canvas {
    width: 100%;
    height: 140px;
    display: block;
    touch-action: none;
    cursor: crosshair;
    background: var(--surface);
  }

  /* FOOTER CTA */
  .footer-cta {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    background: linear-gradient(0deg, var(--bg) 60%, transparent);
    padding: 20px 20px 30px;
    z-index: 100;
  }
  .btn-generate {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    border-radius: var(--radius);
    color: white;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(245,166,35,0.3);
    transition: all 0.2s;
  }
  .btn-generate:active { transform: scale(0.97); }

  /* TOAST */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--green);
    color: white;
    padding: 12px 24px;
    border-radius: 30px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    z-index: 999;
    transition: transform 0.3s ease;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* MODAL RAPPORT */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 500;
    padding: 20px;
    overflow-y: auto;
  }
  .modal-overlay.show { display: flex; align-items: flex-start; }
  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    width: 100%;
    max-width: 500px;
    margin: auto;
  }
  .modal-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 24px;
    cursor: pointer;
    line-height: 1;
  }
  .rapport-line {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .rapport-line:last-child { border-bottom: none; }
  .rapport-key { color: var(--muted); }
  .rapport-val { font-weight: 600; }
  .rapport-status-ok { color: var(--green); }
  .rapport-status-ko { color: var(--red); }
  .rapport-status-rq { color: var(--yellow); }
  .rapport-section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin: 16px 0 8px;
  }
  .btn-share {
    width: 100%;
    margin-top: 20px;
    padding: 14px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast">✓ Rapport généré</div>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="logo">🏎️ Bonnefis<span>Convoyage</span></div>
    <div class="badge-type" id="badge-type">REMISE</div>
  </div>
  <div class="mission-bar">
    <div class="mission-field">
      <label>Immatriculation</label>
      <input type="text" id="immat" placeholder="AA-123-BB">
    </div>
    <div class="mission-field">
      <label>Modèle véhicule</label>
      <input type="text" id="modele" placeholder="BMW M3 Touring">
    </div>
    <div class="mission-field">
      <label>Date</label>
      <input type="date" id="date">
    </div>
    <div class="mission-field">
      <label>Convoyeur</label>
      <input type="text" id="convoyeur" placeholder="Nom Prénom">
    </div>
  </div>
</div>

<!-- TYPE REMISE / RESTITUTION -->
<div class="type-selector">
  <button class="type-btn remise active" onclick="setType('remise')">📤 Remise</button>
  <button class="type-btn restitution" onclick="setType('restitution')">📥 Restitution</button>
</div>

<!-- PROGRESS -->
<div class="progress-wrap">
  <div class="progress-header">
    <span class="progress-label">Progression</span>
    <span class="progress-count" id="prog-count">0 / 0</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="prog-fill"></div>
  </div>
</div>

<!-- KM -->
<div class="km-section">
  <div class="km-label">📍 Kilométrage</div>
  <div class="km-row">
    <div class="km-field">
      <label>Compteur (km)</label>
      <input type="number" id="km" placeholder="45200">
    </div>
    <div class="km-field">
      <label>Carburant (%)</label>
      <input type="number" id="carburant" placeholder="75" min="0" max="100">
    </div>
  </div>
</div>

<!-- CHECKLIST -->
<div id="checklist-container"></div>

<!-- PHOTOS -->
<div class="photos-section">
  <div class="section-title">📷 Photos</div>
  <div class="photo-grid" id="photo-grid"></div>
</div>

<!-- SIGNATURE -->
<div class="sig-section">
  <div class="section-title">✍️ Signature client</div>
  <div class="sig-wrap">
    <div class="sig-label-row">
      <span class="sig-label">Signature</span>
      <button class="sig-clear" onclick="clearSig()">Effacer</button>
    </div>
    <canvas class="sig-canvas" id="sig-canvas"></canvas>
  </div>
</div>

<!-- FOOTER -->
<div class="footer-cta">
  <button onclick="setAllOk()" style="margin-bottom:10px;width:100%;padding:14px;border-radius:12px;border:none;background:#22c55e;color:white;font-weight:700;">
    ✅ Tout cocher OK
  </button>

  <button class="btn-generate" onclick="generateReport()">📋 Générer le rapport</button>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-title">
      Rapport <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-content"></div>
    <button class="btn-share" onclick="shareReport()">📤 Partager / Copier</button>
    <button class="btn-share" onclick="exportPDF()" style="margin-top:10px;background:linear-gradient(135deg, var(--accent2), var(--accent)); border-color:transparent; color:white; font-weight:800;">📄 Enregistrer en PDF</button>
  </div>
</div>

<script>
// DATA
const SECTIONS = [
  {
    title: "🔍 Extérieur",
    items: [
      { id: "pare-choc-av", name: "Pare-choc avant", sub: "Chocs, fissures, rayures" },
      { id: "pare-choc-ar", name: "Pare-choc arrière", sub: "Chocs, fissures, rayures" },
      { id: "carrosserie-g", name: "Flanc gauche", sub: "Portes, ailes, bas de caisse" },
      { id: "carrosserie-d", name: "Flanc droit", sub: "Portes, ailes, bas de caisse" },
      { id: "toit", name: "Toit / Pavillon", sub: "Rayures, enfoncements" },
      { id: "vitres", name: "Vitres & pare-brise", sub: "Fissures, impacts, éclats" },
      { id: "retroviseurs", name: "Rétroviseurs", sub: "Présence, état" },
      { id: "jantes", name: "Jantes & pneus", sub: "État, gonflage visuel" },
      { id: "eclairages", name: "Feux & éclairages", sub: "Avant/arrière, clignotants" },
    ]
  },
  {
    title: "🏎️ Intérieur",
    items: [
      { id: "tableau-bord", name: "Tableau de bord", sub: "Voyants, état général" },
      { id: "sieges", name: "Sièges & coussins", sub: "Taches, déchirures" },
      { id: "moquette", name: "Moquette & sols", sub: "Propreté, état" },
      { id: "volant", name: "Volant & levier", sub: "Usure, état" },
      { id: "equipements", name: "Équipements bord", sub: "GPS, autoradio, clim" },
      { id: "ceintures", name: "Ceintures de sécurité", sub: "Fonctionnement" },
    ]
  },
  {
    title: "⚙️ Mécanique & Documents",
    items: [
      { id: "coffre", name: "Coffre & roue secours", sub: "Cric, triangle, gilet" },
      { id: "huile", name: "Niveau huile moteur", sub: "Vérification visuelle" },
      { id: "carte-grise", name: "Carte grise", sub: "Présente dans le véhicule" },
      { id: "assurance", name: "Attestation assurance", sub: "Présente et valide" },
      { id: "cles", name: "Clés & badge", sub: "Nombre, état" },
      { id: "crit-air", name: "Vignette Crit'Air", sub: "Présente, visible" },
    ]
  }
];

const PHOTOS_LABELS = [
  { id: "ph-av", label: "Avant", icon: "⬆️" },
  { id: "ph-ar", label: "Arrière", icon: "⬇️" },
  { id: "ph-g", label: "Gauche", icon: "⬅️" },
  { id: "ph-d", label: "Droite", icon: "➡️" },
  { id: "ph-avg", label: "3/4 Avant Gauche", icon: "↖️" },
  { id: "ph-avd", label: "3/4 Avant Droit", icon: "↗️" },
  { id: "ph-arg", label: "3/4 Arrière Gauche", icon: "↙️" },
  { id: "ph-ard", label: "3/4 Arrière Droit", icon: "↘️" },
  { id: "ph-int", label: "Intérieur", icon: "💺" },
  { id: "ph-km", label: "Compteur", icon: "📍" },
];

let states = {}; // item id -> 'ok' | 'ko' | 'rq' | null
let remarks = {}; // item id -> string
let currentType = 'remise';
let photoData = {}; // slot id -> base64

// INIT DATE
document.getElementById('date').value = new Date().toISOString().split('T')[0];

function setType(type) {
  currentType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.type-btn.${type}`).classList.add('active');
  const badge = document.getElementById('badge-type');
  badge.textContent = type === 'remise' ? 'REMISE' : 'RESTITUTION';
  badge.className = 'badge-type' + (type === 'restitution' ? ' restitution' : '');
}

function buildChecklist() {
  const container = document.getElementById('checklist-container');
  container.innerHTML = '';

  SECTIONS.forEach(section => {
    const sec = document.createElement('div');
    sec.className = 'section';
    sec.innerHTML = `<div class="section-title">${section.title}</div><div class="items-grid" id="grid-${section.title.replace(/\W/g,'')}"></div>`;
    container.appendChild(sec);

    const grid = sec.querySelector('.items-grid');
    section.items.forEach(item => {
      if (!states[item.id]) states[item.id] = null;

      const row = document.createElement('div');
      row.id = `row-${item.id}`;
      row.className = 'check-item';
      row.innerHTML = `
        <div class="check-icon" id="icon-${item.id}">❓</div>
        <div class="check-info">
          <div class="check-name">${item.name}</div>
          <div class="check-sub">${item.sub}</div>
        </div>
        <div class="state-btns">
          <button class="state-btn ok-btn" onclick="setState('${item.id}','ok')">✓</button>
          <button class="state-btn rq-btn" onclick="setState('${item.id}','rq')">!</button>
          <button class="state-btn ko-btn" onclick="setState('${item.id}','ko')">✗</button>
        </div>
      `;
      grid.appendChild(row);

      // Remarque
      const rq = document.createElement('div');
      rq.className = 'remarque-wrap';
      rq.id = `rq-${item.id}`;
      rq.innerHTML = `<textarea class="remarque-input" placeholder="Préciser la remarque..." id="txt-${item.id}" rows="2"></textarea>`;
      container.appendChild(rq);
    });
  });

  updateProgress();
}

function setState(id, val) {
  const prev = states[id];
  states[id] = (prev === val) ? null : val;
  const s = states[id];

  const row = document.getElementById(`row-${id}`);
  row.className = 'check-item' + (s ? ` ${s}` : '');

  const icon = document.getElementById(`icon-${id}`);
  icon.textContent = s === 'ok' ? '✅' : s === 'ko' ? '❌' : s === 'rq' ? '⚠️' : '❓';

  ['ok','ko','rq'].forEach(t => {
    const btn = row.querySelector(`.${t}-btn`);
    btn.classList.toggle('active', s === t);
  });

  // Remarque visible si rq ou ko
  const rqWrap = document.getElementById(`rq-${id}`);
  if (rqWrap) rqWrap.classList.toggle('visible', s === 'rq' || s === 'ko');

  updateProgress();
}

function updateProgress() {
  const all = Object.keys(states);
  const done = all.filter(k => states[k] !== null).length;
  const total = all.length;
  document.getElementById('prog-count').textContent = `${done} / ${total}`;
  document.getElementById('prog-fill').style.width = total ? `${(done/total)*100}%` : '0%';
}

// PHOTOS
function buildPhotos() {
  const grid = document.getElementById('photo-grid');
  grid.innerHTML = '';
  PHOTOS_LABELS.forEach(ph => {
    const slot = document.createElement('div');
    slot.className = 'photo-slot';
    slot.id = `slot-${ph.id}`;
    slot.innerHTML = `
      <input type="file" accept="image/*" capture="environment" id="input-${ph.id}">
      <span style="font-size:22px">${ph.icon}</span>
      <span>${ph.label}</span>
    `;
    slot.onclick = () => document.getElementById(`input-${ph.id}`).click();
    grid.appendChild(slot);

    document.getElementById(`input-${ph.id}`).addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        photoData[ph.id] = ev.target.result;
        const img = document.createElement('img');
        img.src = ev.target.result;
        slot.innerHTML = '';
        slot.appendChild(img);
      };
      reader.readAsDataURL(file);
    });
  });
}

// SIGNATURE
let sigCanvas, sigCtx, sigDrawing = false, sigHasMark = false;

function initSig() {
  sigCanvas = document.getElementById('sig-canvas');
  sigCtx = sigCanvas.getContext('2d');

  const dpr = window.devicePixelRatio || 1;
  const rect = sigCanvas.getBoundingClientRect();
  sigCanvas.width = rect.width * dpr;
  sigCanvas.height = 140 * dpr;
  sigCtx.scale(dpr, dpr);
  sigCtx.strokeStyle = '#e11d48';
  sigCtx.lineWidth = 2.5;
  sigCtx.lineCap = 'round';
  sigCtx.lineJoin = 'round';

  const getPos = e => {
    const r = sigCanvas.getBoundingClientRect();
    const touch = e.touches ? e.touches[0] : e;
    return { x: touch.clientX - r.left, y: touch.clientY - r.top };
  };

  sigCanvas.addEventListener('mousedown', e => { sigDrawing = true; const p = getPos(e); sigCtx.beginPath(); sigCtx.moveTo(p.x, p.y); });
  sigCanvas.addEventListener('mousemove', e => { if (!sigDrawing) return; const p = getPos(e); sigCtx.lineTo(p.x, p.y); sigCtx.stroke(); sigHasMark = true; });
  sigCanvas.addEventListener('mouseup', () => sigDrawing = false);
  sigCanvas.addEventListener('touchstart', e => { e.preventDefault(); sigDrawing = true; const p = getPos(e); sigCtx.beginPath(); sigCtx.moveTo(p.x, p.y); }, { passive: false });
  sigCanvas.addEventListener('touchmove', e => { e.preventDefault(); if (!sigDrawing) return; const p = getPos(e); sigCtx.lineTo(p.x, p.y); sigCtx.stroke(); sigHasMark = true; }, { passive: false });
  sigCanvas.addEventListener('touchend', () => sigDrawing = false);
}

function clearSig() {
  sigCtx.clearRect(0, 0, sigCanvas.width, sigCanvas.height);
  sigHasMark = false;
}

// RAPPORT
function generateReport() {
  const nomClient = document.getElementById('client-nom').value || '—';
  const prenomClient = document.getElementById('client-prenom').value || '—';
  const modal = document.getElementById('modal');
  const content = document.getElementById('modal-content');

  const immat = document.getElementById('immat').value || '—';
  const modele = document.getElementById('modele').value || '—';
  const date = document.getElementById('date').value || '—';
  const convoyeur = document.getElementById('convoyeur').value || '—';
  const km = document.getElementById('km').value || '—';
  const carb = document.getElementById('carburant').value || '—';
  const allItems = SECTIONS.flatMap(s => s.items);
  const ok = allItems.filter(i => states[i.id] === 'ok');
  const ko = allItems.filter(i => states[i.id] === 'ko');
  const rq = allItems.filter(i => states[i.id] === 'rq');
  const nd = allItems.filter(i => !states[i.id]);

  let html = `
    <div class="rapport-section-title">📋 Informations</div>
    <div class="rapport-line"><span class="rapport-key">Type</span><span class="rapport-val">${currentType.toUpperCase()}</span></div>
    <div class="rapport-line"><span class="rapport-key">Immatriculation</span><span class="rapport-val">${immat}</span></div>
    <div class="rapport-line"><span class="rapport-key">Modèle</span><span class="rapport-val">${modele}</span></div>
    <div class="rapport-line"><span class="rapport-key">Date</span><span class="rapport-val">${date}</span></div>
    <div class="rapport-line"><span class="rapport-key">Convoyeur</span><span class="rapport-val">${convoyeur}</span></div>
    <div class="rapport-line"><span class="rapport-key">Client</span><span class="rapport-val">${prenomClient} ${nomClient}</span></div>
    <div class="rapport-line"><span class="rapport-key">Kilométrage</span><span class="rapport-val">${km} km</span></div>
    <div class="rapport-line"><span class="rapport-key">Carburant</span><span class="rapport-val">${carb} %</span></div>

    <div class="rapport-section-title">📊 Résumé</div>
    <div class="rapport-line"><span class="rapport-key">✅ Conformes</span><span class="rapport-val rapport-status-ok">${ok.length}</span></div>
    <div class="rapport-line"><span class="rapport-key">⚠️ Remarques</span><span class="rapport-val rapport-status-rq">${rq.length}</span></div>
    <div class="rapport-line"><span class="rapport-key">❌ Non conformes</span><span class="rapport-val rapport-status-ko">${ko.length}</span></div>
    <div class="rapport-line"><span class="rapport-key">❓ Non vérifiés</span><span class="rapport-val">${nd.length}</span></div>
  `;

  if (ko.length > 0 || rq.length > 0) {
    html += `<div class="rapport-section-title">⚠️ Points à noter</div>`;
    [...ko, ...rq].forEach(item => {
      const s = states[item.id];
      const txt = document.getElementById(`txt-${item.id}`)?.value;
      html += `<div class="rapport-line" style="flex-direction:column;align-items:flex-start;gap:4px;">
        <span class="${s === 'ko' ? 'rapport-status-ko' : 'rapport-status-rq'}">${s === 'ko' ? '❌' : '⚠️'} ${item.name}</span>
        ${txt ? `<span style="font-size:12px;color:var(--muted)">${txt}</span>` : ''}
      </div>`;
    });
  }

  content.innerHTML = html;
  modal.classList.add('show');

  // Toast
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

function shareReport() {
  const immat = document.getElementById('immat').value || '—';
  const modele = document.getElementById('modele').value || '—';
  const date = document.getElementById('date').value || '—';
  const convoyeur = document.getElementById('convoyeur').value || '—';
  const km = document.getElementById('km').value || '—';
  const carb = document.getElementById('carburant').value || '—';
  const allItems = SECTIONS.flatMap(s => s.items);
  const ko = allItems.filter(i => states[i.id] === 'ko');
  const rq = allItems.filter(i => states[i.id] === 'rq');
  const ok = allItems.filter(i => states[i.id] === 'ok');

  let txt = `🏎️ ÉTAT VÉHICULE — ${currentType.toUpperCase()}\n`;
  txt += `━━━━━━━━━━━━━━━━━━━\n`;
  txt += `📋 ${immat} • ${modele}\n📅 ${date} • ${convoyeur}\n📍 ${km} km • ⛽ ${carb}%\n\n`;
  txt += `✅ Conformes: ${ok.length}\n⚠️ Remarques: ${rq.length}\n❌ Non conf.: ${ko.length}\n\n`;
  if (ko.length + rq.length > 0) {
    txt += `Points signalés:\n`;
    [...ko, ...rq].forEach(item => {
      const s = states[item.id];
      const t = document.getElementById(`txt-${item.id}`)?.value;
      txt += `${s === 'ko' ? '❌' : '⚠️'} ${item.name}${t ? ': ' + t : ''}\n`;
    });
  }

  if (navigator.share) {
    navigator.share({ title: `État véhicule ${immat}`, text: txt }).catch(() => {});
  } else {
    navigator.clipboard.writeText(txt).then(() => {
      const toast = document.getElementById('toast');
      toast.textContent = '📋 Copié !';
      toast.classList.add('show');
      setTimeout(() => { toast.classList.remove('show'); toast.textContent = '✓ Rapport généré'; }, 2000);
    });
  }
}

// PDF EXPORT
function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const W = 210; const margin = 15; const colW = W - margin * 2;
  let y = 20;

  const immat = document.getElementById('immat').value || '—';
  const modele = document.getElementById('modele').value || '—';
  const date = document.getElementById('date').value || '—';
  const convoyeur = document.getElementById('convoyeur').value || '—';
  const nomClient = document.getElementById('client-nom').value || '—';
  const prenomClient = document.getElementById('client-prenom').value || '—';['Client', ${prenomClient} ${nomClient}, '', ''],
  const km = document.getElementById('km').value || '—';
  const carb = document.getElementById('carburant').value || '—';

  const allItems = SECTIONS.flatMap(s => s.items);
  const ok = allItems.filter(i => states[i.id] === 'ok');
  const ko = allItems.filter(i => states[i.id] === 'ko');
  const rq = allItems.filter(i => states[i.id] === 'rq');
  const nd = allItems.filter(i => !states[i.id]);

  const checkY = () => { if (y > 270) { doc.addPage(); y = 20; } };

  // Header band
  doc.setFillColor(15, 17, 23); // Fond sombre
  doc.rect(0, 0, W, 28, 'F');
  
  doc.setFillColor(225, 29, 72); // Ligne horizontale ROUGE
  doc.rect(0, 26, W, 2, 'F');

  // Titre Principal
  doc.setTextColor(225, 29, 72); // Texte ROUGE
  doc.setFontSize(20);
  doc.setFont('helvetica', 'bold');
  doc.text('Bonnefis Convoyage', margin, 17);

  // Sous-titre (décalé pour ne pas chevaucher)
  doc.setTextColor(240, 242, 248);
  doc.setFontSize(10);
  doc.setFont('helvetica', 'normal');
  doc.text('ÉTAT DU VÉHICULE', margin + 72, 17); // Augmenté à 72 pour laisser de la place

  // Type badge
  const typeLabel = currentType.toUpperCase();
  // Remise en rouge, Restitution reste en vert
  const badgeColor = currentType === 'remise' ? [225, 29, 72] : [34, 197, 94]; 
  
  doc.setFillColor(...badgeColor);
  doc.roundedRect(W - margin - 35, 8, 35, 12, 3, 3, 'F'); // Largeur badge augmentée à 35
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(9);
  doc.setFont('helvetica', 'bold');
  doc.text(typeLabel, W - margin - 17.5, 16, { align: 'center' });

  y = 38;

  // Info block
  doc.setFillColor(26, 29, 39);
  doc.roundedRect(margin, y, colW, 36, 3, 3, 'F');
  doc.setDrawColor(46, 50, 73);
  doc.roundedRect(margin, y, colW, 36, 3, 3, 'S');

  const infoData = [
    ['Immatriculation', immat, 'Modèle', modele],
    ['Date', date, 'Convoyeur', convoyeur],
    ['Kilométrage', `${km} km`, 'Carburant', `${carb}%`],
  ];

  const half = colW / 2;
  infoData.forEach((row, i) => {
    const iy = y + 8 + i * 11;
    doc.setFontSize(7.5);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(139, 144, 168);
    doc.text(row[0].toUpperCase(), margin + 6, iy);
    doc.text(row[2].toUpperCase(), margin + 6 + half, iy);
    doc.setFontSize(10);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(240, 242, 248);
    doc.text(row[1], margin + 6, iy + 5);
    doc.text(row[3], margin + 6 + half, iy + 5);
  });

  y += 44;

  // Summary row
  const sumItems = [
    { label: 'CONFORMES', count: ok.length, r: 34, g: 197, b: 94 },
    { label: 'REMARQUES', count: rq.length, r: 245, g: 158, b: 11 },
    { label: 'NON CONF.', count: ko.length, r: 239, g: 68, b: 68 },
    { label: 'NON VÉR.', count: nd.length, r: 139, g: 144, b: 168 },
  ];
  const sumW = colW / 4;
  sumItems.forEach((s, i) => {
    const sx = margin + i * sumW;
    doc.setFillColor(26, 29, 39);
    doc.roundedRect(sx, y, sumW - 2, 22, 2, 2, 'F');
    doc.setDrawColor(s.r, s.g, s.b);
    doc.setLineWidth(0.8);
    doc.roundedRect(sx, y, sumW - 2, 22, 2, 2, 'S');
    doc.setLineWidth(0.2);
    doc.setTextColor(s.r, s.g, s.b);
    doc.setFontSize(18);
    doc.setFont('helvetica', 'bold');
    doc.text(String(s.count), sx + (sumW - 2) / 2, y + 13, { align: 'center' });
    doc.setFontSize(6.5);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(139, 144, 168);
    doc.text(s.label, sx + (sumW - 2) / 2, y + 19, { align: 'center' });
  });

  y += 30;

  // Checklist sections
  SECTIONS.forEach(section => {
    checkY();
    // Section title
    doc.setFillColor(34, 38, 58);
    doc.rect(margin, y, colW, 8, 'F');
    doc.setTextColor(245, 166, 35);
    doc.setFontSize(8);
    doc.setFont('helvetica', 'bold');
    doc.text(section.title.replace(/[^\w\s]/g, '').trim().toUpperCase(), margin + 4, y + 5.5);
    y += 11;

    section.items.forEach(item => {
      checkY();
      const s = states[item.id];
      const txt = document.getElementById(`txt-${item.id}`)?.value;

      // Row background
      const isEven = section.items.indexOf(item) % 2 === 0;
      doc.setFillColor(isEven ? 22 : 26, isEven ? 25 : 29, isEven ? 35 : 39);
      doc.rect(margin, y, colW, txt ? 14 : 9, 'F');

      // Status indicator
      let cr = 139, cg = 144, cb = 168;
      let statusChar = '?';
      if (s === 'ok')  { cr = 34;  cg = 197; cb = 94;  statusChar = 'OK'; }
      if (s === 'ko')  { cr = 239; cg = 68;  cb = 68;  statusChar = 'KO'; }
      if (s === 'rq')  { cr = 245; cg = 158; cb = 11;  statusChar = 'RQ'; }

      doc.setFillColor(cr, cg, cb);
      doc.roundedRect(margin + 2, y + 1.5, 10, 6, 1, 1, 'F');
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(6);
      doc.setFont('helvetica', 'bold');
      doc.text(statusChar, margin + 7, y + 5.5, { align: 'center' });

      // Item name
      doc.setTextColor(240, 242, 248);
      doc.setFontSize(9);
      doc.setFont('helvetica', s ? 'bold' : 'normal');
      doc.text(item.name, margin + 16, y + 5.5);

      // Sub text
      doc.setTextColor(139, 144, 168);
      doc.setFontSize(7);
      doc.setFont('helvetica', 'normal');
      doc.text(item.sub, W - margin - 2, y + 5.5, { align: 'right' });

      // Remarque
      if (txt) {
        doc.setTextColor(cr, cg, cb);
        doc.setFontSize(7.5);
        doc.text(`→ ${txt}`, margin + 16, y + 11);
      }

      // Separator line
      doc.setDrawColor(46, 50, 73);
      doc.setLineWidth(0.2);
      doc.line(margin, y + (txt ? 14 : 9), margin + colW, y + (txt ? 14 : 9));
      y += txt ? 15 : 10;
    });
    y += 4;
  });
  
  // --- AJOUT DES PHOTOS ---
  const photosArray = Object.keys(photoData);

if (photosArray.length > 0) {
  doc.addPage();
  y = 20;

  doc.setTextColor(225, 29, 72);
  doc.setFontSize(14);
  doc.setFont('helvetica', 'bold');
  doc.text("GALERIE PHOTOS", margin, y);
  y += 12;

  const imgW = 85;
  const imgH = 65;
  let currentX = margin;

  photosArray.forEach((id, index) => {

    if (y + imgH > 240) {
      doc.addPage();
      y = 20;
    }

    try {
      doc.addImage(photoData[id], 'JPEG', currentX, y, imgW, imgH);

      const label = PHOTOS_LABELS.find(p => p.id === id)?.label || "Photo";
      doc.setFontSize(8);
      doc.setTextColor(139, 144, 168);
      doc.text(label, currentX + (imgW/2), y + imgH + 4, { align: 'center' });

    } catch (e) {
      console.error(e);
    }

    if (index % 2 === 0) {
      currentX = margin + imgW + 10;
    } else {
      currentX = margin;
      y += imgH + 15;
    }
  });
}

  // --- SIGNATURE (Positionnée en bas de la page actuelle) ---
  if (sigHasMark) {
    // On force la position à 45mm du bas de la page pour qu'elle soit toujours au même endroit
    const sigY = 250; 
    
    doc.setDrawColor(46, 50, 73);
    doc.setLineWidth(0.1);
    doc.line(margin, sigY - 5, W - margin, sigY - 5); // Petite ligne de séparation

    doc.setTextColor(139, 144, 168);
    doc.setFontSize(9);
    doc.setFont('helvetica', 'bold');
    doc.text(`SIGNATURE CLIENT : ${prenomClient} ${nomClient}`, margin, sigY);

    try {
      const sigImg = sigCanvas.toDataURL('image/png');
      // On place la signature sous le texte
      doc.addImage(sigImg, 'PNG', margin, sigY + 2, 60, 25);
    } catch(e) {}
  }

  // Footer (Bas de page automatique sur toutes les pages)
  const pageCount = doc.internal.getNumberOfPages();
  for(let i = 1; i <= pageCount; i++) {
    doc.setPage(i);
    doc.setFillColor(15, 17, 23);
    doc.rect(0, 285, W, 12, 'F');
    doc.setTextColor(139, 144, 168);
    doc.setFontSize(7);
    doc.text(`Document généré le ${date} — Page ${i}/${pageCount}`, W / 2, 292, { align: 'center' });
  }

  doc.save(`Etat_Vehicule_${immat.replace(/-/g,'')}.pdf`);
  closeModal();
} // <--- BIEN VÉRIFIER QUE CETTE ACCOLADE FERME LA FONCTION exportPDF
